async function callClaude(data) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: SCORE_PROMPT + "\n\nData:\n" + JSON.stringify(data) }]
    })
  });
  const d = await res.json();
  return JSON.parse(d.content[0].text.replace(/```json|```/g, "").trim());
}

async function sbFetch() {
  const res = await fetch(SURL + "/rest/v1/aria_usecases?select=*&order=submitted_date.desc", {
    headers: { "apikey": SKEY, "Authorization": "Bearer " + SKEY }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbPatch(uid, data) {
  const res = await fetch(SURL + "/rest/v1/aria_usecases?use_case_id=eq." + uid, {
    method: "PATCH",
    headers: { "Content-Type": "application/json", "apikey": SKEY, "Authorization": "Bearer " + SKEY, "Prefer": "return=representation" },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function fmt(v) { return v > 0 ? "$" + Math.round(v).toLocaleString() : "—"; }

function StageBadge({ stage }) {
  const s = STAGE_COLORS[stage] || STAGE_COLORS["Ideation"];
  return <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 10px", borderRadius:99, fontSize:11, fontWeight:700, background:s.bg, color:s.color, border:"1px solid " + s.border, whiteSpace:"nowrap" }}>{stage}</span>;
}

function RecBadge({ rec }) {
  if (!rec) return null;
  const r = REC_COLORS[rec] || { bg:"#eee", color:"#555", border:"#ccc" };
  return <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 10px", borderRadius:99, fontSize:11, fontWeight:700, background:r.bg, color:r.color, border:"1px solid " + r.border, whiteSpace:"nowrap" }}>{rec}</span>;
}

function Tags({ items }) {
  if (!items || items.length === 0) return <span style={{ color:C.textLight, fontSize:13 }}>—</span>;
  return <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:4 }}>{items.map(t => <span key={t} style={{ padding:"3px 10px", borderRadius:99, fontSize:12, background:"#f0f0f0", color:"#444", border:"1px solid #ddd" }}>{t}</span>)}</div>;
}

function Row({ label, value, mono }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
      <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em", paddingTop:1 }}>{label}</div>
      <div style={{ fontSize:13, color:C.text, lineHeight:1.6, fontFamily:mono?"monospace":"inherit", whiteSpace:"pre-wrap" }}>{value || "—"}</div>
    </div>
  );
}

function Sec({ title, children }) {
  return (
    <div style={{ marginBottom:28 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <div style={{ width:3, height:16, borderRadius:99, background:"#333", flexShrink:0 }} />
        <span style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#555" }}>{title}</span>
        <div style={{ flex:1, height:1, background:C.mistDark }} />
      </div>
      {children}
    </div>
  );
}

function ScoreSection({ sub, onRescore, rescoring }) {
  if (!sub.composite_score && !sub.recommendation) {
    return (
      <Sec title="AI CoE Prioritization Score">
        <div style={{ padding:"16px 18px", background:"#f5f5f5", border:"1px solid #e0e0e0", borderRadius:12, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:13, color:C.textMid }}>This submission has not been scored yet.</span>
          <button onClick={onRescore} disabled={rescoring} style={{ padding:"8px 16px", border:"none", borderRadius:8, background:C.navy, color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{rescoring ? "Scoring..." : "Score now"}</button>
        </div>
      </Sec>
    );
  }
  const rc = REC_COLORS[sub.recommendation] || { bg:"#f0f0f0", color:"#555", border:"#ccc" };
  const dims = [
    { label:"Strategic fit",   score:sub.score_strategic_fit,   note:sub.score_rationale && sub.score_rationale.strategic_fit },
    { label:"Expected impact", score:sub.score_expected_impact, note:sub.score_rationale && sub.score_rationale.expected_impact },
    { label:"Feasibility",     score:sub.score_feasibility,     note:sub.score_rationale && sub.score_rationale.feasibility },
    { label:"Cost",            score:sub.score_cost,            note:sub.score_rationale && sub.score_rationale.cost },
    { label:"Resource",        score:sub.score_resource,        note:sub.score_rationale && sub.score_rationale.resource },
    { label:"Risk",            score:sub.score_risk,            note:sub.score_rationale && sub.score_rationale.risk },
  ];
  return (
    <Sec title="AI CoE Prioritization Score">
      <div style={{ padding:"14px 18px", background:rc.bg, border:"1px solid " + rc.border, borderRadius:12, marginBottom:12 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:11, fontWeight:700, color:rc.color, textTransform:"uppercase", letterSpacing:"0.06em" }}>Recommendation</span>
            <span style={{ fontSize:14, fontWeight:700, color:rc.color }}>{sub.recommendation}</span>
          </div>
          <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
            <span style={{ fontSize:26, fontWeight:800, color:C.navy }}>{sub.composite_score}</span>
            <span style={{ fontSize:12, color:C.textLight }}>/100</span>
          </div>
        </div>
        {sub.score_summary && <div style={{ fontSize:13, color:C.textMid, lineHeight:1.6 }}>{sub.score_summary}</div>}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
        {dims.map(d => (
          <div key={d.label} style={{ padding:"8px 10px", background:"#f5f5f5", borderRadius:8 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
              <span style={{ fontSize:11, fontWeight:600, color:"#888" }}>{d.label}</span>
              <span style={{ fontSize:13, fontWeight:700, color:C.navy }}>{d.score || "—"}/5</span>
            </div>
            {d.note && <div style={{ fontSize:11, color:"#999", lineHeight:1.4 }}>{d.note}</div>}
          </div>
        ))}
      </div>
      {sub.score_flags && sub.score_flags.length > 0 && (
        <div style={{ padding:"8px 12px", background:"#fff8e0", border:"1px solid #f0d080", borderRadius:8, marginBottom:8 }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#a06000", textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:4 }}>Flags for AI CoE</div>
          {sub.score_flags.map((f,i) => <div key={i} style={{ fontSize:12, color:"#7a4d00" }}>• {f}</div>)}
        </div>
      )}
      <div style={{ display:"flex", gap:8, alignItems:"center", justifyContent:"flex-end" }}>
        {sub.scored_at && <span style={{ fontSize:11, color:"#bbb" }}>Scored {new Date(sub.scored_at).toLocaleString()}</span>}
        <button onClick={onRescore} disabled={rescoring} style={{ padding:"6px 14px", border:"1px solid #ccc", borderRadius:8, background:"#fff", color:C.navy, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{rescoring ? "Scoring..." : "Re-score"}</button>
      </div>
    </Sec>
  );
}

          <div style={{ fontSize:20, fontWeight:800, color:C.navy, marginBottom:6 }}>{sub.s1.name}</div>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <StageBadge stage={sub.stage} />
            {sub.recommendation && <RecBadge rec={sub.recommendation} />}
            <span style={{ fontSize:12, fontFamily:"monospace", color:C.textLight }}>{sub.id}</span>
            <span style={{ fontSize:12, color:C.textLight }}>Submitted {sub.submittedDate}</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <a href={"index.html?edit=" + sub.id} style={{ padding:"8px 16px", borderRadius:8, border:"1px solid #ccc", background:"#fff", color:C.navy, fontSize:13, fontWeight:600, textDecoration:"none", cursor:"pointer" }}>Edit</a>
          <button onClick={onRescore} disabled={rescoring} style={{ padding:"8px 16px", borderRadius:8, border:"none", background:C.navy, color:"#fff", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{rescoring ? "Scoring..." : "Re-score"}</button>
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:28 }}>
        {[
          { label:"Total cost",    value:fmt(sub.s4.totalCost) },
          { label:"Annual value",  value:fmt(sub.s4.annualValue) },
          { label:"Payback",       value:sub.s4.payback ? sub.s4.payback + " mo" : "—" },
        ].map(m => (
          <div key={m.label} style={{ background:C.mist, borderRadius:8, padding:"10px 14px" }}>
            <div style={{ fontSize:11, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:4 }}>{m.label}</div>
            <div style={{ fontSize:16, fontWeight:700, color:C.navy }}>{m.value}</div>
          </div>
        ))}
      </div>

      <ScoreSection sub={sub} onRescore={onRescore} rescoring={rescoring} />

      <Sec title="Step 1 — Basic information">
        <Row label="AI initiative name" value={sub.s1.name} />
        <Row label="Business line" value={sub.s1.businessLine} />
        <Row label="Business unit / team" value={sub.s1.team} />
        <Row label="Executive sponsor" value={sub.s1.sponsor} />
        <Row label="Initiative owner" value={sub.s1.owner} />
        <Row label="Target start date" value={sub.s1.startDate} />
        <Row label="Expected go-live date" value={sub.s1.goLiveDate} />
        <Row label="AI tool / vendor" value={sub.s1.vendor} />
      </Sec>

      <Sec title="Step 2 — Problem statement">
        <Row label="What problem are you solving?" value={sub.s2.problem} />
        <Row label="How many people will adopt this?" value={sub.s2.adopters} />
        <Row label="Why now?" value={sub.s2.whyNow} />
        <Row label="What happens if we don't act?" value={sub.s2.inaction} />
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>Problem type</div>
          <Tags items={sub.s2.problemTypes} />
        </div>
      </Sec>

      <Sec title="Step 3 — Strategic alignment">
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>Strategic pillars</div>
          <Tags items={sub.s3.pillars} />
        </div>
        <Row label="How does this support the pillar?" value={sub.s3.howAligned} />
        <Row label="On approved AI roadmap?" value={sub.s3.roadmap} />
        <Row label="Dependencies / related initiatives" value={sub.s3.dependencies} />
      </Sec>

      <Sec title="Step 4 — Investment & return">
        <Row label="Total estimated cost" value={fmt(sub.s4.totalCost)} />
        <Row label="Cost confidence level" value={sub.s4.confidence} />
        <Row label="Build / dev cost" value={fmt(sub.s4.buildCost)} />
        <Row label="Licensing / vendor cost" value={fmt(sub.s4.licenseCost)} />
        <Row label="Annual run cost" value={fmt(sub.s4.runCost)} />
        <Row label="Primary return type" value={sub.s4.returnType} />
        {sub.s4.calcInputs && sub.s4.calcInputs.length > 0 && (
          <div style={{ padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:10 }}>Calculator inputs</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
              {["Line item","Input","Subtotal"].map(h => <div key={h} style={{ fontSize:11, fontWeight:700, color:C.textLight, textTransform:"uppercase" }}>{h}</div>)}
              {sub.s4.calcInputs.map((r,i) => [
                <div key={"a"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{r.label}</div>,
                <div key={"b"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{r.a || r.b || "—"}</div>,
                <div key={"c"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{r.subtotal || "—"}</div>,
              ])}
            </div>
          </div>
        )}
        <Row label="Projected annual value" value={fmt(sub.s4.annualValue)} />
        <Row label="Payback period" value={sub.s4.payback ? sub.s4.payback + " months" : "—"} />
      </Sec>

      <Sec title="Step 5 — KPIs & success metrics">
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>KPI categories</div>
          <Tags items={sub.s5.kpiCats} />
        </div>
        {sub.s5.kpis && sub.s5.kpis.length > 0 && (
          <div style={{ padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:10 }}>KPI targets</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 100px 80px 80px", gap:8 }}>
              {["KPI","Unit","Baseline","Target"].map(h => <div key={h} style={{ fontSize:11, fontWeight:700, color:C.textLight, textTransform:"uppercase" }}>{h}</div>)}
              {sub.s5.kpis.map((k,i) => [
                <div key={"n"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{k.name}</div>,
                <div key={"u"+i} style={{ fontSize:13, color:C.textMid, padding:"4px 0" }}>{k.unit}</div>,
                <div key={"b"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{k.baseline}</div>,
                <div key={"t"+i} style={{ fontSize:13, fontWeight:600, color:C.navy, padding:"4px 0" }}>{k.target}</div>,
              ])}
            </div>
          </div>
        )}
        <Row label="How will KPIs be measured?" value={sub.s5.measureMethod} />
        <Row label="Benefits realization owner" value={sub.s5.realizationOwner} />
        <Row label="Success at 90 days" value={sub.s5.success90} />
        <Row label="Success at 12 months" value={sub.s5.success12mo} />
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>UX assessment</div>
          <Tags items={sub.s5.uxMethods} />
        </div>
      </Sec>

      <Sec title="Step 6 — Risk & compliance">
        <Row label="Data classification" value={sub.s6.dataClass} />
        <Row label="Does this use client data?" value={sub.s6.clientData} />
        <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>Regulatory exposure</div>
          <Tags items={sub.s6.regs} />
        </div>
        <Row label="Model risk classification" value={sub.s6.modelRisk} />
        <Row label="Legal review required?" value={sub.s6.legalNeeded} />
        {sub.s6.legalNeeded === "Yes" && <Row label="Legal review status" value={sub.s6.legalStatus} />}
        {sub.s6.legalNeeded === "Yes" && (
          <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em" }}>Legal areas</div>
            <Tags items={sub.s6.legalAreas} />
          </div>
        )}
        <Row label="Known risks / concerns" value={sub.s6.risks} />
      </Sec>

      <Sec title="Step 7 — Team & resources">
        {sub.s7.team && sub.s7.team.length > 0 && (
          <div style={{ padding:"10px 0", borderBottom:"1px solid " + C.mist }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em", marginBottom:10 }}>Core team</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 80px", gap:8 }}>
              {["Role","Name / Team","% allocated"].map(h => <div key={h} style={{ fontSize:11, fontWeight:700, color:C.textLight, textTransform:"uppercase" }}>{h}</div>)}
              {sub.s7.team.map((t,i) => [
                <div key={"r"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{t.role}</div>,
                <div key={"n"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{t.name}</div>,
                <div key={"p"+i} style={{ fontSize:13, color:C.text, padding:"4px 0" }}>{t.pct}%</div>,
              ])}
            </div>
          </div>
        )}
        <Row label="Resource constraints / blockers" value={sub.s7.constraints} />
        <Row label="Additional notes for AI CoE" value={sub.s7.notes} />
      </Sec>
    </div>
  );
}

function mapRow(r) {
  const f = v => v ? "$" + Number(v).toLocaleString() : "—";
  function buildCalc(r) {
    const rt = r.return_type;
    if(rt==="Cost savings") return [
      {label:"FTE redeployment",a:r.cost_ftes?r.cost_ftes+" FTEs":"—",subtotal:r.cost_ftes&&r.cost_time_pct&&r.cost_salary?f(r.cost_ftes*(r.cost_time_pct/100)*r.cost_salary)+"/yr":"—"},
      {label:"Licenses eliminated",a:r.cost_licenses?r.cost_licenses+" licenses":"—",subtotal:r.cost_licenses&&r.cost_license_amt?f(r.cost_licenses*r.cost_license_amt)+"/yr":"—"},
      {label:"Infrastructure",a:"—",subtotal:r.cost_infra?f(r.cost_infra)+"/yr":"—"},
    ];
    if(rt==="Efficiency / productivity") return [
      {label:"Hours saved / week",a:r.eff_hrs?r.eff_hrs+" hrs":"—",b:r.eff_rate?f(r.eff_rate)+"/hr":"—",subtotal:r.eff_hrs&&r.eff_rate?f(r.eff_hrs*52*r.eff_rate)+"/yr":"—"},
      {label:"Errors / month",a:r.eff_errors?r.eff_errors+" errors":"—",subtotal:r.eff_errors&&r.eff_error_cost?f(r.eff_errors*12*r.eff_error_cost)+"/yr":"—"},
      {label:"Queries deflected",a:r.eff_queries?r.eff_queries+" queries":"—",subtotal:r.eff_queries&&r.eff_query_cost?f(r.eff_queries*12*r.eff_query_cost)+"/yr":"—"},
    ];
    if(rt==="Risk reduction") return [
      {label:"Incident avoidance",a:r.risk_prob?r.risk_prob+"% prob":"—",subtotal:r.risk_prob&&r.risk_incident?f((r.risk_prob/100)*r.risk_incident)+"/yr":"—"},
      {label:"Regulatory fine",a:r.risk_fine_likely?r.risk_fine_likely+"% likelihood":"—",subtotal:r.risk_fine&&r.risk_fine_likely?f(r.risk_fine*(r.risk_fine_likely/100))+"/yr":"—"},
    ];
    return [];
  }
  return {
    id: r.use_case_id, stage: r.stage, submittedDate: r.submitted_date, raw: r,
    composite_score: r.composite_score, recommendation: r.recommendation,
    score_rationale: r.score_rationale, score_flags: r.score_flags,
    score_summary: r.score_summary, scored_at: r.scored_at,
    score_strategic_fit: r.score_strategic_fit, score_expected_impact: r.score_expected_impact,
    score_feasibility: r.score_feasibility, score_cost: r.score_cost,
    score_resource: r.score_resource, score_risk: r.score_risk,
    s1:{ name:r.name, businessLine:r.business_line, team:r.team, sponsor:r.sponsor, owner:r.owner, startDate:r.start_date, goLiveDate:r.go_live_date, vendor:r.vendor },
    s2:{ problem:r.problem, adopters:r.adopters, whyNow:r.why_now, inaction:r.inaction, problemTypes:r.problem_types||[] },
    s3:{ pillars:r.pillars||[], howAligned:r.how_aligned, roadmap:r.roadmap, dependencies:r.dependencies },
    s4:{ totalCost:r.total_cost, confidence:r.cost_confidence, buildCost:r.build_cost, licenseCost:r.license_cost, runCost:r.run_cost, returnType:r.return_type, annualValue:r.annual_value, payback:r.payback_months, calcInputs:buildCalc(r) },
    s5:{ kpiCats:r.kpi_cats||[], kpis:r.kpis||[], measureMethod:r.measure_method, realizationOwner:r.realization_owner, success90:r.success_90, success12mo:r.success_12mo, uxMethods:r.ux_methods||[] },
    s6:{ dataClass:r.data_class, clientData:r.client_data, regs:r.regs||[], modelRisk:r.model_risk, legalNeeded:r.legal_needed, legalStatus:r.legal_status, legalAreas:r.legal_areas||[], risks:r.risks },
    s7:{ team:r.team_members||[], constraints:r.constraints, notes:r.notes },
  };
}

function ARIARepository() {
  const [subs, setSubs] = useState(HARDCODED);
  const [selected, setSelected] = useState(HARDCODED[0]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState("");
  const [stageFilter, setStageFilter] = useState("All");
  const [rescoring, setRescoring] = useState(false);

  useEffect(() => {
    sbFetch()
      .then(rows => {
        const live = rows.map(mapRow);
        const liveIds = new Set(live.map(r => r.id));
        const merged = [...live, ...HARDCODED.filter(s => !liveIds.has(s.id))];
        setSubs(merged);
        setSelected(merged[0] || null);
      })
      .catch(e => console.error("Fetch error:", e))
      .finally(() => setLoading(false));
  }, []);

  async function handleRescore(sub) {
    setRescoring(true);
    try {
      const data = sub.raw || sub;
      const scores = await callClaude(data);
      const patch = { ...scores, scored_at: new Date().toISOString() };
      await sbPatch(sub.id, patch);
      const updated = { ...sub, ...patch };
      setSubs(prev => prev.map(s => s.id === sub.id ? updated : s));
      setSelected(updated);
    } catch(e) { alert("Rescore failed: " + e.message); }
    finally { setRescoring(false); }
  }

  const stages = ["All", ...Array.from(new Set(subs.map(s => s.stage)))];
  const filtered = subs.filter(s => {
    const q = search.toLowerCase();
    const matchSearch = !q || s.s1.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q) || s.s1.businessLine.toLowerCase().includes(q);
    const matchStage = stageFilter === "All" || s.stage === stageFilter;
    return matchSearch && matchStage;
  });

  return (
    <div style={{ fontFamily:"'DM Sans','Nunito',system-ui,sans-serif", background:C.mist, height:"100vh", display:"flex", flexDirection:"column" }}>

      <div style={{ background:"#1a1a1a", padding:"0 28px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", height:52 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:26, height:26, borderRadius:7, background:"rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff" }}>A</div>
            <span style={{ fontSize:14, fontWeight:700, color:"#fff", letterSpacing:"0.05em" }}>ARIA</span>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)", margin:"0 6px" }}>·</span>
            <span style={{ fontSize:13, color:"rgba(255,255,255,0.55)" }}>Use case repository</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            {loading && <span style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>Loading...</span>}
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{subs.length} submissions</span>
            <a href="index.html" style={{ fontSize:12, color:"rgba(255,255,255,0.6)", textDecoration:"none" }}>+ New intake</a>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        <div style={{ width:340, flexShrink:0, borderRight:"1px solid " + C.border, background:C.white, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ padding:"14px 16px", borderBottom:"1px solid " + C.mistDark, flexShrink:0 }}>
            <input type="text" placeholder="Search by name, ID, or business line..." value={search} onChange={e => setSearch(e.target.value)} style={{ width:"100%", fontSize:13, padding:"8px 10px", border:"1px solid " + C.border, borderRadius:8, fontFamily:"inherit", color:C.text, background:C.mist, outline:"none", boxSizing:"border-box" }} />
            <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
              {stages.map(s => (
                <button key={s} onClick={() => setStageFilter(s)} style={{ padding:"3px 10px", fontSize:11, borderRadius:99, cursor:"pointer", fontFamily:"inherit", fontWeight:600, border:stageFilter===s?"1.5px solid #333":"1px solid " + C.border, background:stageFilter===s?"#1a1a1a":C.white, color:stageFilter===s?"#fff":C.textMid }}>{s}</button>
              ))}
            </div>
          </div>

          <div style={{ overflowY:"auto", flex:1 }}>
            {filtered.length === 0 && <div style={{ padding:24, fontSize:13, color:C.textLight, textAlign:"center" }}>No submissions match your search.</div>}
            {filtered.map(sub => (
              <div key={sub.id} onClick={() => setSelected(sub)} style={{ padding:"14px 16px", borderBottom:"1px solid " + C.mistDark, cursor:"pointer", background:selected && selected.id === sub.id ? "#f7f7f7" : C.white, borderLeft:selected && selected.id === sub.id ? "3px solid #1a1a1a" : "3px solid transparent" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:C.navy, lineHeight:1.4, flex:1, paddingRight:8 }}>{sub.s1.name}</div>
                  <StageBadge stage={sub.stage} />
                </div>
                <div style={{ fontSize:11, fontFamily:"monospace", color:C.textLight, marginBottom:4 }}>{sub.id}</div>
                <div style={{ fontSize:12, color:C.textMid, marginBottom:6 }}>{sub.s1.businessLine} · {sub.s1.team}</div>
                {(sub.recommendation || sub.composite_score) && (
                  <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                    {sub.recommendation && <RecBadge rec={sub.recommendation} />}
                    {sub.composite_score && <span style={{ fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:99, background:"#f0f0f0", color:"#555" }}>{sub.composite_score}/100</span>}
                  </div>
                )}
                <div style={{ display:"flex", gap:16 }}>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Cost</div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{fmt(sub.s4.totalCost)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Annual value</div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{fmt(sub.s4.annualValue)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Vendor</div>
                    <div style={{ fontSize:12, color:C.textMid }}>{sub.s1.vendor ? sub.s1.vendor.split(" ")[0] : "—"}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ flex:1, overflowY:"auto", background:"#fafafa" }}>
          {selected
            ? <DetailPanel sub={selected} onRescore={() => handleRescore(selected)} rescoring={rescoring} />
            : <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", color:C.textLight, fontSize:14 }}>Select a submission to view details</div>
          }
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ARIARepository));
  </script>
</body>
</html>
