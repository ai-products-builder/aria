async function scoreWithClaude(data) {
  const res = await fetch(ANTHROPIC_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: SCORING_PROMPT + "\n\nSubmission:\n" + JSON.stringify(data, null, 2) }]
    })
  });
  const d = await res.json();
  const text = d.content[0].text.replace(/```json|```/g, "").trim();
  return JSON.parse(text);
}

async function fetchSubmissions() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/aria_usecases?select=*&order=submitted_date.desc`, {
    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function patchSupabase(useCase_id, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/aria_usecases?use_case_id=eq.${useCase_id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Prefer": "return=representation"
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

}

function buildCalcInputs(r) {
  const f = v => v ? "$" + Number(v).toLocaleString() : "—";
  const rt = r.return_type;
  if(rt==="Cost savings") return [
    {label:"FTE redeployment", a:r.cost_ftes?r.cost_ftes+" FTEs":"—", subtotal:r.cost_ftes&&r.cost_time_pct&&r.cost_salary?f(r.cost_ftes*(r.cost_time_pct/100)*r.cost_salary)+"/yr":"—"},
    {label:"Licenses eliminated", a:r.cost_licenses?r.cost_licenses+" licenses":"—", subtotal:r.cost_licenses&&r.cost_license_amt?f(r.cost_licenses*r.cost_license_amt)+"/yr":"—"},
    {label:"Infrastructure reduction", a:"—", subtotal:r.cost_infra?f(r.cost_infra)+"/yr":"—"},
  ];
  if(rt==="Efficiency / productivity") return [
    {label:"Hours saved / week", a:r.eff_hrs?r.eff_hrs+" hrs":"—", b:r.eff_rate?f(r.eff_rate)+"/hr":"—", subtotal:r.eff_hrs&&r.eff_rate?f(r.eff_hrs*52*r.eff_rate)+"/yr":"—"},
    {label:"Errors reduced / month", a:r.eff_errors?r.eff_errors+" errors":"—", b:r.eff_error_cost?f(r.eff_error_cost)+"/error":"—", subtotal:r.eff_errors&&r.eff_error_cost?f(r.eff_errors*12*r.eff_error_cost)+"/yr":"—"},
    {label:"Queries deflected / month", a:r.eff_queries?r.eff_queries+" queries":"—", b:r.eff_query_cost?f(r.eff_query_cost)+"/query":"—", subtotal:r.eff_queries&&r.eff_query_cost?f(r.eff_queries*12*r.eff_query_cost)+"/yr":"—"},
  ];
  if(rt==="Risk reduction") return [
    {label:"Incident avoidance", a:r.risk_prob?r.risk_prob+"% prob":"—", subtotal:r.risk_prob&&r.risk_incident?f((r.risk_prob/100)*r.risk_incident)+"/yr":"—"},
    {label:"Regulatory fine", a:r.risk_fine_likely?r.risk_fine_likely+"% likelihood":"—", subtotal:r.risk_fine&&r.risk_fine_likely?f(r.risk_fine*(r.risk_fine_likely/100))+"/yr":"—"},
  ];
  if(rt==="Revenue generation") return [
    {label:"New deals", a:r.rev_deals?r.rev_deals+" deals/yr":"—", subtotal:r.rev_deals&&r.rev_deal_value?f(r.rev_deals*r.rev_deal_value)+"/yr":"—"},
    {label:"Conversion lift", a:r.rev_lift?r.rev_lift+"%":"—", subtotal:r.rev_lift&&r.rev_base?f((r.rev_lift/100)*r.rev_base)+"/yr":"—"},
  ];
  if(rt==="Mixed (multiple types)") return [
    {label:"Cost savings", a:"—", subtotal:r.mix_cost?f(r.mix_cost):"—"},
    {label:"Efficiency gains", a:"—", subtotal:r.mix_eff?f(r.mix_eff):"—"},
    {label:"Revenue generated", a:"—", subtotal:r.mix_rev?f(r.mix_rev):"—"},
    {label:"Risk avoided", a:"—", subtotal:r.mix_risk?f(r.mix_risk):"—"},
  ];
  return [];
}

function fmt(v) { return v > 0 ? "$" + Math.round(v).toLocaleString() : "—"; }

function StageBadge({ stage }) {
  const s = STAGE_COLORS[stage] || STAGE_COLORS["Ideation"];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", padding:"3px 10px", borderRadius:99, fontSize:11, fontWeight:700, background:s.bg, color:s.color, border:`1px solid ${s.border}`, whiteSpace:"nowrap" }}>
      {stage}
    </span>
  );
}

function Tags({ items }) {
  if (!items || items.length === 0) return <span style={{ color: C.textLight, fontSize: 13 }}>—</span>;
  return (
    <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:4 }}>
      {items.map(t => (
        <span key={t} style={{ padding:"3px 10px", borderRadius:99, fontSize:12, background:"#f0f0f0", color:"#444", border:"1px solid #ddd" }}>{t}</span>
      ))}
    </div>
  );
}

function Row({ label, value, mono }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:16, padding:"10px 0", borderBottom:`1px solid ${C.mist}` }}>
      <div style={{ fontSize:12, fontWeight:600, color:C.textLight, textTransform:"uppercase", letterSpacing:"0.05em", paddingTop:1 }}>{label}</div>
      <div style={{ fontSize:13, color:C.text, lineHeight:1.6, fontFamily: mono ? "monospace" : "inherit", whiteSpace:"pre-wrap" }}>{value || "—"}</div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom:28 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <div style={{ width:3, height:16, borderRadius:99, background:"#333", flexShrink:0 }} />
        <span style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", color:"#555" }}>{title}</span>

    </div>
  );
}

function ARIARepository() {
  const [allSubmissions, setAllSubmissions] = useState(SUBMISSIONS);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);
  const [selected, setSelected] = useState(null);
  const [rescoring, setRescoring] = useState(false);

  useEffect(() => {
    fetchSubmissions()
      .then(rows => {
        const live = rows.map(mapRow);
        const liveIds = new Set(live.map(r => r.id));
        const merged = [...live, ...SUBMISSIONS.filter(s => !liveIds.has(s.id))];
        setAllSubmissions(merged);
        setSelected(merged[0] || null);
      })
      .catch(e => setFetchError(e.message))
      .finally(() => setLoading(false));
  }, []);

  async function handleRescore(sub) {
    setRescoring(true);
    try {
      const scores = await scoreWithClaude(sub.raw || sub);
      await patchSupabase(sub.id, { ...scores, scored_at: new Date().toISOString() });
      const updated = { ...sub, ...scores };
      setAllSubmissions(prev => prev.map(s => s.id === sub.id ? updated : s));
      setSelected(updated);
    } catch(e) { alert("Rescore failed: " + e.message); }
    finally { setRescoring(false); }
  }
  const [search, setSearch] = useState("");
  const [stageFilter, setStageFilter] = useState("All");

  const stages = ["All", ...Array.from(new Set(allSubmissions.map(s => s.stage)))];

  const filtered = allSubmissions.filter(s => {
    const q = search.toLowerCase();
    const matchSearch = !q || s.s1.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q) || s.s1.businessLine.toLowerCase().includes(q);
    const matchStage = stageFilter === "All" || s.stage === stageFilter;
    return matchSearch && matchStage;
  });

  return (
    <div style={{ fontFamily:"'DM Sans','Nunito',system-ui,sans-serif", background:C.mist, height:"100vh", display:"flex", flexDirection:"column" }}>

      <div style={{ background:"#1a1a1a", padding:"0 28px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", height:52 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:26, height:26, borderRadius:7, background:"rgba(255,255,255,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff" }}>A</div>
            <span style={{ fontSize:14, fontWeight:700, color:"#fff", letterSpacing:"0.05em" }}>ARIA</span>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)", margin:"0 6px" }}>·</span>
            <span style={{ fontSize:13, color:"rgba(255,255,255,0.55)" }}>Use case repository</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{SUBMISSIONS.length} submissions</span>
          </div>
        </div>
      </div>

      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        <div style={{ width:340, flexShrink:0, borderRight:`1px solid ${C.border}`, background:C.white, display:"flex", flexDirection:"column", overflow:"hidden" }}>

          <div style={{ padding:"14px 16px", borderBottom:`1px solid ${C.mistDark}`, flexShrink:0 }}>
            <input
              type="text"
              placeholder="Search by name or ID..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ width:"100%", fontSize:13, padding:"8px 10px", border:`1px solid ${C.border}`, borderRadius:8, fontFamily:"inherit", color:C.text, background:C.mist, outline:"none", boxSizing:"border-box" }}
            />
            <div style={{ display:"flex", gap:6, marginTop:10, flexWrap:"wrap" }}>
              {stages.map(s => (
                <button key={s} onClick={() => setStageFilter(s)} style={{
                  padding:"3px 10px", fontSize:11, borderRadius:99, cursor:"pointer", fontFamily:"inherit", fontWeight:600,
                  border: stageFilter===s ? "1.5px solid #333" : `1px solid ${C.border}`,
                  background: stageFilter===s ? "#1a1a1a" : C.white,
                  color: stageFilter===s ? "#fff" : C.textMid,
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div style={{ overflowY:"auto", flex:1 }}>
            {filtered.length === 0 && (
              <div style={{ padding:24, fontSize:13, color:C.textLight, textAlign:"center" }}>No submissions match your search.</div>
            )}
            {filtered.map(sub => (
              <div key={sub.id} onClick={() => setSelected(sub)} style={{
                padding:"14px 16px", borderBottom:`1px solid ${C.mistDark}`, cursor:"pointer",
                background: selected?.id === sub.id ? "#f7f7f7" : C.white,
                borderLeft: selected?.id === sub.id ? "3px solid #1a1a1a" : "3px solid transparent",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:C.navy, lineHeight:1.4, flex:1, paddingRight:8 }}>{sub.s1.name}</div>
                  <StageBadge stage={sub.stage} />
                </div>
                <div style={{ fontSize:11, fontFamily:"monospace", color:C.textLight, marginBottom:4 }}>{sub.id}</div>
                <div style={{ fontSize:12, color:C.textMid }}>{sub.s1.businessLine} · {sub.s1.team}</div>
                <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
                  {sub.recommendation && (() => {
                    const rc = {Prioritize:{bg:"#e6f4ea",color:"#1a7a3c"},Review:{bg:"#fff8e0",color:"#a06000"},Deprioritize:{bg:"#fce8e8",color:"#a01a1a"}}[sub.recommendation]||{bg:"#eee",color:"#555"};
                    return <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:rc.bg,color:rc.color}}>{sub.recommendation}</span>;
                  })()}
                  {sub.composite_score && <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:"#f0f0f0",color:"#333"}}>{sub.composite_score}/100</span>}
                </div>
                <div style={{ display:"flex", gap:16, marginTop:8 }}>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Cost</div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{fmt(sub.s4.totalCost)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Annual value</div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{fmt(sub.s4.annualValue)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:10, color:C.textLight, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>Vendor</div>
                    <div style={{ fontSize:12, color:C.textMid }}>{sub.s1.vendor.split(" ")[0]}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ flex:1, overflowY:"auto", background:"#fafafa" }}>
          {selected ? <DetailPanel sub={selected} /> : (
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100%", color:C.textLight, fontSize:14 }}>
              Select a submission to view details
            </div>
          )}
        </div>

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ARIARepository));
  </script>
</body>
</html>
